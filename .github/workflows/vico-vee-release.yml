name: vico-vee Release

on:
  push:
    tags:
      - "vico-vee-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: macos-aarch64

    defaults:
      run:
        working-directory: src-tauri/vico-vee

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri/vico-vee"
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin vico-vee

      - name: Package tarball
        run: |
          mkdir -p dist/vico-vee
          cp target/${{ matrix.target }}/release/vico-vee dist/vico-vee/
          cp -r scripts dist/vico-vee/ 2>/dev/null || true
          cp -r systemd dist/vico-vee/ 2>/dev/null || true
          cp README.md dist/vico-vee/ 2>/dev/null || true
          cp ROADMAP.md dist/vico-vee/ 2>/dev/null || true
          tar -czf "vico-vee-${{ matrix.asset }}.tar.gz" -C dist vico-vee

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vico-vee-${{ matrix.asset }}
          path: src-tauri/vico-vee/vico-vee-${{ matrix.asset }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
