openapi: 3.1.0
info:
  title: vico-vee API
  description: ViCo Execution Environment — standalone sandboxed execution service
  version: 0.3.0
servers:
  - url: http://localhost:9987
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health probe
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service is not ready
  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
  /openapi.json:
    get:
      summary: OpenAPI specification as JSON
      security: []
      responses:
        "200":
          description: OpenAPI JSON
  /docs:
    get:
      summary: API documentation page
      security: []
      responses:
        "200":
          description: Documentation HTML
          content:
            text/html:
              schema:
                type: string
  /admin/backup:
    post:
      summary: Create a backup tarball
      responses:
        "200":
          description: Backup tarball
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/restore:
    post:
      summary: Restore from a backup tarball
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Restore completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /vee/submit:
    post:
      summary: Submit a task for execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeeSubmitRequest"
      responses:
        "200":
          description: Task submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeSubmitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/status:
    post:
      summary: Get execution status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeeExecutionIdRequest"
      responses:
        "200":
          description: Execution status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/cancel:
    post:
      summary: Cancel an execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeeExecutionIdRequest"
      responses:
        "200":
          description: Execution cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/list:
    post:
      summary: List executions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeeListRequest"
      responses:
        "200":
          description: Execution list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/artifacts:
    post:
      summary: Get artifacts for an execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeeExecutionIdRequest"
      responses:
        "200":
          description: Artifacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeArtifactsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/dashboard:
    post:
      summary: Dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeDashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/patterns:
    post:
      summary: Find execution patterns
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VeePatternRequest"
      responses:
        "200":
          description: Pattern list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeePatternResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/audit:
    post:
      summary: Run audit report
      responses:
        "200":
          description: Audit report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeAuditResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/checkpoints:
    post:
      summary: Checkpoint statistics
      responses:
        "200":
          description: Checkpoint stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeCheckpointResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/odin/health:
    post:
      summary: ODIN health probe
      responses:
        "200":
          description: ODIN health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OdinHealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/odin/model:
    post:
      summary: Set ODIN model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OdinSetModelRequest"
      responses:
        "200":
          description: ODIN model updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/events:
    get:
      summary: Stream VEE execution events
      responses:
        "101":
          description: WebSocket upgrade
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /vee/admin/rotate-key:
    post:
      summary: Rotate capability signing key
      responses:
        "200":
          description: Signing key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/diff:
    post:
      summary: Request an Osmosis diff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OsmosisDiffRequest"
      responses:
        "200":
          description: Diff task submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeSubmitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/merge:
    post:
      summary: Request an Osmosis merge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OsmosisMergeRequest"
      responses:
        "200":
          description: Merge task submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeSubmitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /vee/reject:
    post:
      summary: Request an Osmosis reject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OsmosisRejectRequest"
      responses:
        "200":
          description: Reject task submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeeSubmitResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key token from api_keys.toml
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: API key lacks required scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PayloadTooLarge:
      description: Request body exceeds configured limit
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
    VeeSubmitRequest:
      type: object
      required:
        - agent_id
        - language
        - source_code
      properties:
        run_id:
          type: string
        agent_id:
          type: string
        language:
          type: string
          enum:
            - python
            - rust
            - javascript
            - go
            - bound
            - context_bundle
            - shell
            - wasm
            - osmosis
        source_code:
          type: string
        capabilities:
          type: array
          items:
            type: string
        budget:
          $ref: "#/components/schemas/ExecutionBudget"
        hypothesis:
          $ref: "#/components/schemas/ExecutionHypothesis"
    VeeSubmitResponse:
      type: object
      properties:
        success:
          type: boolean
        execution_id:
          type: string
        status:
          type: string
        message:
          type: string
        error:
          type: string
    VeeExecutionIdRequest:
      type: object
      required:
        - execution_id
      properties:
        execution_id:
          type: string
    VeeStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/ExecutionResult"
        error:
          type: string
    VeeListRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - pending
            - queued
            - executing
            - completed
            - failed
            - cancelled
        limit:
          type: integer
          default: 50
    VeeListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionResult"
    VeeArtifactsResponse:
      type: object
      properties:
        success:
          type: boolean
        execution_id:
          type: string
        artifacts:
          type: array
          items:
            type: object
    VeeDashboardResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            total:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            pending:
              type: integer
            avg_latency_ms:
              type: integer
    VeePatternRequest:
      type: object
      properties:
        tag:
          type: string
        limit:
          type: integer
          default: 50
    VeePatternResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PatternRecord"
    VeeAuditResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            overall_pass:
              type: boolean
            passed:
              type: integer
            failed:
              type: integer
            critical_failures:
              type: integer
            timestamp:
              type: string
              format: date-time
            tests:
              type: array
              items:
                type: object
    VeeCheckpointResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            checkpoints:
              type: integer
    OdinHealthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            healthy:
              type: boolean
            models:
              type: array
              items:
                type: string
            active_model:
              type: string
    OdinSetModelRequest:
      type: object
      required:
        - model
      properties:
        model:
          type: string
    ExecutionBudget:
      type: object
      properties:
        cpu_seconds:
          type: integer
        memory_mb:
          type: integer
        disk_mb:
          type: integer
        token_budget:
          type: integer
        wall_clock_seconds:
          type: integer
    ExecutionHypothesis:
      type: object
      properties:
        expected_schema:
          $ref: "#/components/schemas/DataSchema"
        expected_row_count:
          $ref: "#/components/schemas/Range"
        expected_columns:
          type: array
          items:
            type: string
        expected_types:
          type: object
          additionalProperties:
            type: string
            enum:
              - String
              - Integer
              - Float
              - Boolean
              - DateTime
              - Json
              - Binary
        invariants:
          type: array
          items:
            type: string
    DataSchema:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnDef"
    ColumnDef:
      type: object
      properties:
        name:
          type: string
        data_type:
          type: string
        nullable:
          type: boolean
    Range:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
    ExecutionResult:
      type: object
      properties:
        execution_id:
          type: string
        project_id:
          type: string
        status:
          type: string
          enum:
            - Pending
            - Queued
            - Simulating
            - Executing
            - Validating
            - Completed
            - Failed
            - Recovered
            - Cancelled
        phase:
          type: string
          enum:
            - Hypothesis
            - Simulation
            - Execution
            - Validation
            - Feedback
        artifacts:
          type: array
          items:
            type: object
        validation:
          $ref: "#/components/schemas/ValidationResult"
        confidence:
          type: number
          format: float
        tokens_consumed:
          type: integer
        cpu_seconds_used:
          type: number
          format: float
        memory_peak_mb:
          type: number
          format: float
        latency_ms:
          type: integer
        error_log:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    ValidationResult:
      type: object
      properties:
        hypothesis_validated:
          type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ValidationCheck"
        confidence:
          type: number
          format: float
        deviations:
          type: array
          items:
            $ref: "#/components/schemas/Deviation"
    ValidationCheck:
      type: object
      properties:
        name:
          type: string
        passed:
          type: boolean
        detail:
          type: string
    Deviation:
      type: object
      properties:
        field:
          type: string
        expected:
          type: string
        actual:
          type: string
        severity:
          type: string
          enum:
            - Minor
            - Major
            - Critical
    PatternRecord:
      type: object
      properties:
        pattern_id:
          type: string
        description:
          type: string
        success_rate:
          type: number
          format: float
    OsmosisDiffRequest:
      type: object
      required:
        - left_execution_id
      properties:
        left_execution_id:
          type: string
        left_artifact_id:
          type: string
        right_execution_id:
          type: string
        right_artifact_id:
          type: string
        target_path:
          type: string
        format:
          type: string
          enum:
            - unified
            - structured
    OsmosisMergeRequest:
      type: object
      required:
        - source_execution_id
        - target_path
      properties:
        source_execution_id:
          type: string
        source_artifact_id:
          type: string
        target_path:
          type: string
        strategy:
          type: string
          enum:
            - append
            - overwrite
        base_execution_id:
          type: string
        base_artifact_id:
          type: string
    OsmosisRejectRequest:
      type: object
      required:
        - source_execution_id
        - target_path
      properties:
        source_execution_id:
          type: string
        source_artifact_id:
          type: string
        target_path:
          type: string
        base_execution_id:
          type: string
        base_artifact_id:
          type: string
        reason:
          type: string
