openapi: 3.1.0
info:
  title: vico-vee API
  description: ViCo Execution Environment — standalone sandboxed execution service
  version: 0.1.0
servers:
  - url: http://localhost:9987
paths:
  /health:
    get:
      summary: Health probe
      responses:
        "200":
          description: Service is alive
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service is not ready
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
  /admin/backup:
    post:
      summary: Create a backup tarball
      responses:
        "200":
          description: Backup tarball
  /admin/restore:
    post:
      summary: Restore from a backup tarball
      responses:
        "200":
          description: Restore completed
  /vee/submit:
    post:
      summary: Submit a task for execution
      responses:
        "200":
          description: Task submitted
  /vee/status:
    post:
      summary: Get execution status
      responses:
        "200":
          description: Execution status
  /vee/cancel:
    post:
      summary: Cancel an execution
      responses:
        "200":
          description: Execution cancelled
  /vee/list:
    post:
      summary: List executions
      responses:
        "200":
          description: Execution list
  /vee/artifacts:
    post:
      summary: Get artifacts for an execution
      responses:
        "200":
          description: Artifacts list
  /vee/dashboard:
    post:
      summary: Dashboard statistics
      responses:
        "200":
          description: Dashboard stats
  /vee/patterns:
    post:
      summary: Find execution patterns
      responses:
        "200":
          description: Pattern list
  /vee/audit:
    post:
      summary: Run audit report
      responses:
        "200":
          description: Audit report
  /vee/checkpoints:
    post:
      summary: Checkpoint statistics
      responses:
        "200":
          description: Checkpoint stats
  /vee/odin/health:
    post:
      summary: ODIN health probe
      responses:
        "200":
          description: ODIN health
  /vee/odin/model:
    post:
      summary: Set ODIN model
      responses:
        "200":
          description: ODIN model updated
  /vee/events:
    get:
      summary: Stream VEE execution events
      responses:
        "101":
          description: WebSocket upgrade
  /vee/admin/rotate-key:
    post:
      summary: Rotate capability signing key
      responses:
        "200":
          description: Signing key rotated
  /vee/diff:
    post:
      summary: Request an Osmosis diff
      responses:
        "200":
          description: Diff task submitted
  /vee/merge:
    post:
      summary: Request an Osmosis merge
      responses:
        "200":
          description: Merge task submitted
  /vee/reject:
    post:
      summary: Request an Osmosis reject
      responses:
        "200":
          description: Reject task submitted
  /openapi.json:
    get:
      summary: OpenAPI specification as JSON
      responses:
        "200":
          description: OpenAPI JSON
  /docs:
    get:
      summary: API documentation page
      responses:
        "200":
          description: Documentation HTML
